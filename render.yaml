services:
  # ─── Backend API (Node.js + Express + Socket.io) ───────────────────────────
  - type: web
    name: sokonet-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000           # Render assigns this automatically; 10000 is the default
      - key: MONGO_URI
        sync: false            # Set in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BANK_PAYBILL
        value: 247247
      - key: BANK_ACCOUNT
        value: 0870185429080
      - key: EMAIL_SERVICE
        value: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ─── Frontend (React + Vite) ───────────────────────────────────────────────
  - type: web
    name: sokonet-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sokonet-api.onrender.com/api
